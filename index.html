<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltaGo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#0E3B2E;--green2:#15543F;--signal:#1FA971;--brass:#E0A23B;
  --paper:#F5F5F0;--card:#FFFFFF;--ink:#14201B;--muted:#6B7A72;--line:#E4E7E2;
  --danger:#C2563B;--resto:#3B6BE0;--cond:#8B3BE0;--casa:#E06B1F;
  --shadow:0 12px 40px rgba(14,59,46,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:radial-gradient(900px 500px at 0% 0%,#103a2d,transparent 60%),radial-gradient(700px 400px at 100% 100%,#0a2219,transparent 60%),#0b271f;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 12px 60px}

/* phone shell */
.phone{width:390px;max-width:95vw;min-height:800px;background:var(--paper);border-radius:44px;box-shadow:var(--shadow),0 0 0 10px #0a221b,0 0 0 11px #1d4636;overflow:hidden;position:relative;display:flex;flex-direction:column}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:140px;height:25px;background:#0a221b;border-radius:0 0 14px 14px;z-index:40}
.statusbar{height:42px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 22px 5px;font-size:12px;font-weight:600;color:var(--ink);z-index:10;position:relative}
.scroll-area{flex:1;overflow-y:auto}
.scroll-area::-webkit-scrollbar{width:0}

/* auth screens */
.auth-wrap{padding:40px 24px 32px;display:flex;flex-direction:column;min-height:680px}
.logo-big{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk';font-weight:700;font-size:26px;margin-bottom:6px}
.logo-mark{width:34px;height:34px;background:var(--signal);border-radius:10px;display:grid;place-items:center}
.logo-mark svg{width:20px;height:20px}
.go{color:var(--brass)}
.auth-sub{font-size:13.5px;color:var(--muted);margin-bottom:32px;line-height:1.5}
.auth-title{font-family:'Space Grotesk';font-weight:600;font-size:22px;margin-bottom:20px;letter-spacing:-.3px}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.1em}
.field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:14.5px;font-family:'Inter';background:var(--card);color:var(--ink);outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--signal)}

.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;border:none;cursor:pointer;font-family:'Space Grotesk';font-weight:600;font-size:15px;padding:15px;border-radius:13px;background:var(--signal);color:#06231A;transition:.15s;margin-top:4px}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink);margin-top:10px}
.btn.dark{background:var(--green);color:#EAF2EC}
.btn.brass{background:var(--brass);color:#3a2602}
.btn.danger{background:var(--danger);color:#fff}

.link-btn{background:none;border:none;color:var(--signal);font-size:13.5px;cursor:pointer;font-family:'Inter';font-weight:500;padding:4px 0}

.error-box{background:#FDECEA;border:1px solid #F5C6C2;border-radius:11px;padding:10px 12px;font-size:12.5px;color:#8B2318;margin-bottom:12px;display:none}
.error-box.show{display:block}
.success-box{background:#EAF7F1;border:1px solid #BFE6D4;border-radius:11px;padding:10px 12px;font-size:12.5px;color:#0c5e44;margin-bottom:12px;display:none}
.success-box.show{display:block}

.divider-or{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--line)}

/* tipo selector */
.tipo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.tipo-opt{border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:.15s;background:var(--card)}
.tipo-opt:hover{border-color:var(--signal)}
.tipo-opt.on{border-color:var(--signal);background:#EAF7F1}
.tipo-opt.on.resto{border-color:var(--resto);background:#EEF2FC}
.tipo-opt.on.cond{border-color:var(--cond);background:#F2EEFB}
.tipo-opt .tipo-ico{font-size:22px;margin-bottom:4px}
.tipo-opt .tipo-lbl{font-size:11px;font-weight:600;color:var(--muted)}
.tipo-opt.on .tipo-lbl{color:var(--ink)}

/* app chrome */
.appbar{padding:6px 18px 14px;background:var(--paper);position:sticky;top:0;z-index:20}
.appbar.dark-bar{background:var(--green);border-radius:0 0 20px 20px;padding-bottom:18px;color:#EAF2EC}
.ab-sub{font-size:12.5px;color:var(--muted)}
.dark-bar .ab-sub{color:#9DBFB1}
.ab-title{font-family:'Space Grotesk';font-weight:600;font-size:21px;letter-spacing:-.3px;margin-top:2px}
.ab-row{display:flex;align-items:center;justify-content:space-between}
.ab-icon{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.12);display:grid;place-items:center;cursor:pointer;border:none}

.screen{display:none;padding:0 16px 80px;animation:fi .2s ease}
.screen.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:12px}
.card.dark-card{background:var(--green);border:none;color:#EAF2EC}
.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:600}
.dark-card .eyebrow{color:#9DBFB1}
.t2{font-family:'Space Grotesk';font-weight:600;font-size:16px;letter-spacing:-.2px;margin-top:2px}
.sub{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:4px}
.bignum{font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-1px}
.between{display:flex;justify-content:space-between;align-items:center}
.divider{height:1px;background:var(--line);margin:12px 0}
.dark-card .divider{background:rgba(255,255,255,.15)}
.pill{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:99px;white-space:nowrap}
.pill.green{background:#EAF7F1;color:#0c5e44}
.pill.brass{background:#FBF1DD;color:#8a5e14}
.pill.grey{background:#EEF1EE;color:#5a6862}
.pill.blue{background:#EEF2FC;color:#2345a8}
.pill.purple{background:#F2EEFB;color:#5c1fa8}
.pill.orange{background:#FBF1EB;color:#a83d1f}
.note{border-radius:12px;padding:11px 12px;font-size:12px;line-height:1.5;margin-top:12px;display:flex;gap:8px}
.note.ok{background:#EAF7F1;border:1px solid #BFE6D4;color:#0c5e44}
.note.warn{background:#FBF1DD;border:1px solid #ECD9AE;color:#6e5212}
.stats3{display:flex;gap:8px;margin-top:12px}
.stats3 .s{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 8px}
.stats3 .sn{font-family:'Space Grotesk';font-weight:700;font-size:18px}
.stats3 .sl{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.3}
.list-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:none}
.li-main{flex:1;min-width:0}
.li-title{font-weight:600;font-size:13.5px}
.li-sub{font-size:11.5px;color:var(--muted);margin-top:1px}
.ic{width:36px;height:36px;border-radius:10px;background:#EFF3F0;display:grid;place-items:center;flex:none}

/* nav */
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid var(--line);padding:8px 4px 12px}
.nav button{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:500;padding:3px 2px}
.nav button svg{width:21px;height:21px;stroke:currentColor;fill:none}
.nav button.on{color:var(--green)}

/* toast */
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--green);color:#EAF2EC;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:.3s;z-index:60;display:flex;gap:8px;align-items:center;max-width:88%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* spinner */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:12px;color:var(--muted);font-size:13.5px}
.loading-full .spinner{border-color:rgba(31,169,113,.3);border-top-color:var(--signal);width:32px;height:32px;border-width:3px}

/* user badge */
.user-badge{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#EAF7F1;border-radius:12px;margin-bottom:16px}
.user-av{width:36px;height:36px;border-radius:50%;background:var(--signal);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;color:#06231A;font-size:13px;flex:none}
.user-info{flex:1;min-width:0}
.user-email{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-tipo{font-size:11px;font-weight:600;color:#0c5e44}

/* bairro card */
.bairro-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.bairro-item:last-child{border-bottom:none}
.bairro-dot{width:10px;height:10px;border-radius:50%;flex:none}
</style>
</head>
<body>

<div class="phone" id="phone">
  <div class="notch"></div>
  <div class="statusbar"><span>9:41</span><span id="statusTitle">VoltaGo</span><span>5G ▮▮</span></div>
  <div class="scroll-area" id="mainScroll">
    <div id="appRoot"></div>
  </div>
  <div class="nav" id="nav" style="display:none"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
// ── Supabase init ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://sbilvocobtjeytwtgoiy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiaWx2b2NvYnRqZXl0d3Rnb2l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDU4MDQsImV4cCI6MjA5ODEyMTgwNH0.suTQCVLhIIZNuMRmeAeXQcCqlZi1oLd8LKIbi1jhVcY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── State ────────────────────────────────────────────────────────────────────
let appState = {
  session: null,
  user: null,
  conta: null,
  screen: 'home',
  zona: null,
  bairros: [],
  loading: true
};

let toastTmr;
function showToast(m) {
  const t = document.getElementById('toast');
  t.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#9DE7C6" stroke-width="2.2" width="16" height="16"><path d="M5 12l4 4L19 7"/></svg><span>${m}</span>`;
  t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Icons ────────────────────────────────────────────────────────────────────
const ic = {
  home: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M3 11l9-7 9 7M5 10v10h14V10"/></svg>`,
  list: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M8 6h12M8 12h12M8 18h12M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>`,
  wallet: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="3" y="6" width="18" height="13" rx="3"/><path d="M16 12h2"/></svg>`,
  leaf: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M5 19c8 1 14-4 14-13 0 0-9-1-12 4-2 3-2 9-2 9zM5 19c1-5 4-7 8-9"/></svg>`,
  user: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>`,
  bell: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6zM10 20a2 2 0 0 0 4 0"/></svg>`,
  logout: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.2"><path d="M5 12l4 4L19 7"/></svg>`,
  info: `<svg viewBox="0 0 20 20" fill="none" stroke-width="1.7"><circle cx="10" cy="10" r="8"/><path d="M10 9v5M10 6h.01"/></svg>`,
  pin: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M12 21s7-6 7-11a7 7 0 1 0-14 0c0 5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>`,
};
function ico(k, c='#0E3B2E') {
  return ic[k]?.replace(/stroke-width/g, `stroke="${c}" stroke-width`).replace(/<(path|circle|rect)/g, '<$1 fill="none"') || '';
}

// ── Nav ──────────────────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('nav');
  if (!appState.session) { nav.style.display = 'none'; return; }
  nav.style.display = 'flex';
  const items = [
    ['home', 'Início', ic.home],
    ['recolhas', 'Recolhas', ic.list],
    ['carteira', 'Carteira', ic.wallet],
    ['perfil', 'Perfil', ic.user],
  ];
  nav.innerHTML = items.map(([id, lab, svg]) =>
    `<button class="${appState.screen === id ? 'on' : ''}" onclick="goTo('${id}')">
      ${svg}<span>${lab}</span>
    </button>`
  ).join('');
}

function goTo(s) {
  appState.screen = s;
  renderApp();
}

// ── Auth screens ─────────────────────────────────────────────────────────────
function renderLogin() {
  document.getElementById('statusTitle').textContent = 'VoltaGo';
  document.getElementById('nav').style.display = 'none';
  return `
  <div class="auth-wrap">
    <div class="logo-big">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4a8 8 0 1 0 7.5 5.3" stroke="#06231A" stroke-width="2.4" stroke-linecap="round"/><path d="M19.5 4.2v4.2h-4.2" stroke="#06231A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      Volta<span class="go">Go</span>
    </div>
    <p class="auth-sub">A reciclagem chega até si.<br>Condomínios, restaurantes e casas.</p>
    <div class="auth-title">Entrar</div>
    <div class="error-box" id="loginErr"></div>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="o.seu@email.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input type="password" id="loginPwd" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div class="divider-or">ou</div>
    <button class="btn ghost" onclick="showRegister()">Criar conta</button>
    <div style="text-align:center;margin-top:16px">
      <button class="link-btn" onclick="showForgot()">Esqueceu a password?</button>
    </div>
  </div>`;
}

function renderRegister() {
  document.getElementById('nav').style.display = 'none';
  return `
  <div class="auth-wrap">
    <div class="logo-big">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4a8 8 0 1 0 7.5 5.3" stroke="#06231A" stroke-width="2.4" stroke-linecap="round"/><path d="M19.5 4.2v4.2h-4.2" stroke="#06231A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      Volta<span class="go">Go</span>
    </div>
    <div class="auth-title" style="margin-top:12px">Criar conta</div>
    <div class="error-box" id="regErr"></div>
    <div class="success-box" id="regOk"></div>
    <div class="field"><label>Nome</label><input type="text" id="regNome" placeholder="O seu nome"/></div>
    <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="o.seu@email.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="regPwd" placeholder="mínimo 6 caracteres"/></div>
    <div class="field"><label>Tipo de conta</label></div>
    <div class="tipo-grid">
      <div class="tipo-opt cond on" data-t="condominio" onclick="selectTipo(this)">
        <div class="tipo-ico">🏢</div><div class="tipo-lbl">Condomínio</div>
      </div>
      <div class="tipo-opt resto" data-t="restaurante" onclick="selectTipo(this)">
        <div class="tipo-ico">☕</div><div class="tipo-lbl">Restaurante</div>
      </div>
      <div class="tipo-opt" data-t="casa" onclick="selectTipo(this)">
        <div class="tipo-ico">🏠</div><div class="tipo-lbl">Casa</div>
      </div>
    </div>
    <div class="field"><label>Nome do local / edifício</label><input type="text" id="regNomeLocal" placeholder="ex: Condomínio Foz Plaza"/></div>
    <button class="btn" id="regBtn" onclick="doRegister()">Criar conta</button>
    <button class="btn ghost" onclick="showLogin()">Já tenho conta</button>
  </div>`;
}

function renderForgot() {
  return `
  <div class="auth-wrap">
    <div class="auth-title" style="margin-top:40px">Recuperar password</div>
    <div class="error-box" id="forgotErr"></div>
    <div class="success-box" id="forgotOk"></div>
    <div class="field"><label>Email</label><input type="email" id="forgotEmail" placeholder="o.seu@email.com"/></div>
    <button class="btn" onclick="doForgot()">Enviar link de recuperação</button>
    <button class="btn ghost" onclick="showLogin()">Voltar</button>
  </div>`;
}

// ── Auth actions ─────────────────────────────────────────────────────────────
let currentAuthScreen = 'login';

function showLogin() { currentAuthScreen = 'login'; renderApp(); }
function showRegister() { currentAuthScreen = 'register'; renderApp(); }
function showForgot() { currentAuthScreen = 'forgot'; renderApp(); }

function selectTipo(el) {
  document.querySelectorAll('.tipo-opt').forEach(x => x.classList.remove('on'));
  el.classList.add('on');
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  if (!email || !pwd) { showErr(err, 'Preencha o email e a password.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> A entrar…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) { showErr(err, error.message); btn.disabled = false; btn.innerHTML = 'Entrar'; }
}

async function doRegister() {
  const btn = document.getElementById('regBtn');
  const err = document.getElementById('regErr');
  const ok = document.getElementById('regOk');
  const nome = document.getElementById('regNome').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pwd = document.getElementById('regPwd').value;
  const nomeLocal = document.getElementById('regNomeLocal').value.trim();
  const tipo = document.querySelector('.tipo-opt.on')?.dataset.t || 'casa';
  if (!nome || !email || !pwd || !nomeLocal) { showErr(err, 'Preencha todos os campos.'); return; }
  if (pwd.length < 6) { showErr(err, 'A password deve ter pelo menos 6 caracteres.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> A criar conta…';
  err.classList.remove('show');
  const { data, error } = await sb.auth.signUp({
    email, password: pwd,
    options: { data: { nome, tipo, nome_local: nomeLocal } }
  });
  if (error) { showErr(err, error.message); btn.disabled = false; btn.innerHTML = 'Criar conta'; return; }
  // Criar conta na tabela contas
  if (data.user) {
    const zonaId = appState.zona?.id;
    await sb.from('contas').insert({
      tipo, nome: nomeLocal, zona_id: zonaId,
      cidade: 'Porto', estado: tipo === 'casa' ? 'espera' : 'ativa'
    });
  }
  ok.textContent = 'Conta criada! Verifique o seu email para confirmar.';
  ok.classList.add('show');
  btn.disabled = false;
  btn.innerHTML = 'Criar conta';
}

async function doForgot() {
  const err = document.getElementById('forgotErr');
  const ok = document.getElementById('forgotOk');
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { showErr(err, 'Introduza o seu email.'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) { showErr(err, error.message); return; }
  ok.textContent = 'Link enviado! Verifique o seu email.';
  ok.classList.add('show');
}

async function doLogout() {
  await sb.auth.signOut();
}

function showErr(el, msg) {
  el.textContent = msg;
  el.classList.add('show');
}

// ── App screens ───────────────────────────────────────────────────────────────
function renderHome() {
  const u = appState.user;
  const conta = appState.conta;
  const tipo = u?.user_metadata?.tipo || 'casa';
  const nomeLocal = conta?.nome || u?.user_metadata?.nome_local || '—';
  const bairros = appState.bairros;

  const tipoLabel = tipo === 'condominio' ? 'Condomínio' : tipo === 'restaurante' ? 'Restaurante' : 'Casa';
  const tipoPill = tipo === 'condominio' ? 'purple' : tipo === 'restaurante' ? 'blue' : 'orange';

  return `
  <div class="appbar dark-bar">
    <div class="ab-row">
      <div><div class="ab-sub">Zona Porto · ${tipoLabel}</div>
      <div class="ab-title">${nomeLocal}</div></div>
      <button class="ab-icon" onclick="goTo('perfil')">${ico('bell','#EAF2EC')}</button>
    </div>
  </div>
  <div class="screen on">
    <div class="card dark-card">
      <div class="between">
        <div><div class="eyebrow">Depósito acumulado</div>
        <div class="bignum" style="margin-top:4px">0,00 <span style="font-size:14px;color:#9DBFB1">€</span></div></div>
        <span class="pill ${tipoPill}">${tipoLabel}</span>
      </div>
      <div class="divider"></div>
      <div class="between">
        <span style="font-size:12.5px;color:#9DBFB1">Estado da conta</span>
        <span class="pill green">${conta?.estado === 'ativa' ? 'Ativa' : 'Em configuração'}</span>
      </div>
    </div>

    ${tipo === 'casa' ? `
    <div class="note warn" style="margin-top:12px">
      ${ico('info','#8a5e14')}
      <div>A sua casa entra na lista de espera do bairro. Avisamos quando uma rota abrir na sua zona.</div>
    </div>
    ` : `
    <div class="note ok" style="margin-top:12px">
      ${ico('check','#0c5e44')}
      <div>Conta ${tipoLabel} ativa na Zona Porto. Contacte-nos para agendar a primeira recolha.</div>
    </div>
    `}

    <div class="card" style="margin-top:14px">
      <div class="eyebrow">Zona Porto · Bairros ativos</div>
      <div style="margin-top:8px">
        ${appState.bairros.length === 0
          ? '<p class="sub" style="padding:8px 0">A carregar bairros…</p>'
          : appState.bairros.map(b => `
          <div class="bairro-item">
            <div class="bairro-dot" style="background:${b.tem_rota ? '#1FA971' : '#E0A23B'}"></div>
            <div class="li-main"><div class="li-title">${b.nome}</div>
            <div class="li-sub">${b.casas_aderentes} casas · ${b.tem_rota ? 'rota ativa' : 'em espera'}</div></div>
            <span class="pill ${b.tem_rota ? 'green' : 'brass'}">${b.tem_rota ? 'ativo' : 'espera'}</span>
          </div>`).join('')
        }
      </div>
    </div>

    <button class="btn brass" style="margin-top:16px" onclick="showToast('Em breve — agendamento disponível na próxima versão.')">
      Pedir recolha
    </button>
  </div>`;
}

function renderRecolhas() {
  return `
  <div class="appbar">
    <div class="ab-title">Recolhas</div>
  </div>
  <div class="screen on">
    <div style="display:flex;flex-direction:column;align-items:center;padding:48px 0 16px;gap:12px;color:var(--muted)">
      <div style="width:56px;height:56px;background:#EFF3F0;border-radius:50%;display:grid;place-items:center">
        ${ico('list')}
      </div>
      <div style="font-family:'Space Grotesk';font-weight:600;font-size:16px;color:var(--ink)">Sem recolhas ainda</div>
      <p class="sub" style="text-align:center;max-width:260px">As suas recolhas aparecem aqui depois da primeira visita do motorista.</p>
    </div>
    <button class="btn" onclick="goTo('home')">Pedir primeira recolha</button>
  </div>`;
}

function renderCarteira() {
  return `
  <div class="appbar dark-bar">
    <div class="ab-title">Carteira</div>
  </div>
  <div class="screen on">
    <div class="card dark-card" style="text-align:center;padding:22px 14px">
      <div class="eyebrow">Saldo disponível</div>
      <div class="bignum" style="margin-top:6px">0,00 €</div>
      <div style="font-size:12.5px;color:#9DBFB1;margin-top:2px">Pronto a levantar</div>
    </div>
    <div class="note warn" style="margin-top:12px">
      ${ico('info','#8a5e14')}
      <div>O saldo cresce após cada recolha confirmada pelo motorista. O valor do depósito (0,10 €/embalagem) é 100% seu.</div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="eyebrow">Como receber</div>
      ${['MB WAY · Imediato', 'Transferência bancária · 1-2 dias', 'Doação a IPSS · 100% para a causa'].map(o =>
        `<div class="list-item"><div class="li-main"><div class="li-title">${o.split('·')[0]}</div><div class="li-sub">${o.split('·')[1]}</div></div><span class="pill grey">Em breve</span></div>`
      ).join('')}
    </div>
  </div>`;
}

function renderPerfil() {
  const u = appState.user;
  const tipo = u?.user_metadata?.tipo || 'casa';
  const nome = u?.user_metadata?.nome || '—';
  const email = u?.email || '—';
  const iniciais = nome.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();

  return `
  <div class="appbar">
    <div class="ab-title">Perfil</div>
  </div>
  <div class="screen on">
    <div class="user-badge" style="margin-top:4px">
      <div class="user-av">${iniciais}</div>
      <div class="user-info">
        <div style="font-weight:600;font-size:14px">${nome}</div>
        <div class="user-email">${email}</div>
        <div class="user-tipo">${tipo === 'condominio' ? '🏢 Condomínio' : tipo === 'restaurante' ? '☕ Restaurante' : '🏠 Casa'}</div>
      </div>
    </div>
    <div class="card">
      <div class="eyebrow">Conta Supabase</div>
      <div class="list-item"><div class="li-main"><div class="li-title">Autenticação</div><div class="li-sub">Email verificado via Supabase Auth</div></div><span class="pill green">Real</span></div>
      <div class="list-item"><div class="li-main"><div class="li-title">Base de dados</div><div class="li-sub">PostgreSQL · eu-west-1 · Irlanda</div></div><span class="pill green">Online</span></div>
      <div class="list-item"><div class="li-main"><div class="li-title">RLS</div><div class="li-sub">Row Level Security ativa</div></div><span class="pill green">Seguro</span></div>
    </div>
    <div class="note ok" style="margin-top:12px">
      ${ico('check','#0c5e44')}
      <div>Está autenticado com uma conta <b>real</b> no Supabase. Os dados estão na base de dados PostgreSQL em produção.</div>
    </div>
    <button class="btn danger" style="margin-top:20px" onclick="doLogout()">
      ${ico('logout','#fff')}&nbsp;Terminar sessão
    </button>
  </div>`;
}

function renderLoading() {
  return `<div class="loading-full"><div class="spinner"></div><span>A carregar…</span></div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderApp() {
  const root = document.getElementById('appRoot');
  const scroll = document.getElementById('mainScroll');

  if (appState.loading) { root.innerHTML = renderLoading(); renderNav(); return; }

  if (!appState.session) {
    if (currentAuthScreen === 'register') root.innerHTML = renderRegister();
    else if (currentAuthScreen === 'forgot') root.innerHTML = renderForgot();
    else root.innerHTML = renderLogin();
    renderNav();
    return;
  }

  scroll.scrollTop = 0;
  switch(appState.screen) {
    case 'home':     root.innerHTML = renderHome(); break;
    case 'recolhas': root.innerHTML = renderRecolhas(); break;
    case 'carteira': root.innerHTML = renderCarteira(); break;
    case 'perfil':   root.innerHTML = renderPerfil(); break;
    default:         root.innerHTML = renderHome();
  }
  renderNav();
}

// ── Data fetching ─────────────────────────────────────────────────────────────
async function loadZona() {
  const { data } = await sb.from('zonas').select('*').eq('estado','ativa').limit(1).single();
  appState.zona = data;
}

async function loadBairros() {
  if (!appState.zona) return;
  const { data } = await sb.from('bairros').select('*').eq('zona_id', appState.zona.id).order('nome');
  appState.bairros = data || [];
}

async function loadConta() {
  if (!appState.user) return;
  const { data } = await sb.from('conta_utilizadores')
    .select('conta_id, contas(*)')
    .eq('user_id', appState.user.id)
    .limit(1)
    .maybeSingle();
  appState.conta = data?.contas || null;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  // Auth state listener
  sb.auth.onAuthStateChange(async (event, session) => {
    appState.session = session;
    appState.user = session?.user || null;
    if (session) {
      currentAuthScreen = 'login';
      await loadZona();
      await Promise.all([loadBairros(), loadConta()]);
    }
    appState.loading = false;
    renderApp();
  });

  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { appState.loading = false; renderApp(); }
}

// expose to onclick
window.doLogin = doLogin;
window.doRegister = doRegister;
window.doForgot = doForgot;
window.doLogout = doLogout;
window.showLogin = showLogin;
window.showRegister = showRegister;
window.showForgot = showForgot;
window.selectTipo = selectTipo;
window.goTo = goTo;
window.showToast = showToast;

init();
</script>
